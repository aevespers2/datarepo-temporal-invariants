name: Validate datarepo candidate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: datarepo-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONPATH: src

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Assert exact source identity
        shell: bash
        env:
          EXPECTED_HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$EXPECTED_HEAD"
          printf 'verified_head=%s\n' "$actual"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-validation.txt

      - name: Install validation dependencies
        run: python -m pip install --requirement requirements-validation.txt

      - name: Validate package metadata and declared extras
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/candidate-validation
          python -m pip install \
            --dry-run \
            --no-deps \
            --no-build-isolation \
            ".[dev]" \
            2>&1 | tee reports/candidate-validation/package-metadata-dry-run.txt

      - name: Compile inherited source
        run: python -m compileall -q src/datarepo

      - name: Run inherited tests
        run: |
          mkdir -p reports/candidate-validation
          python -m pytest -q test \
            --junitxml=reports/candidate-validation/pytest.xml

      - name: Run fatal lint checks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/candidate-validation
          flake8 src/datarepo \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            2>&1 | tee reports/candidate-validation/flake8-fatal.txt

      - name: Record broader lint inventory
        shell: bash
        run: |
          set -euo pipefail
          flake8 src/datarepo \
            --count \
            --exit-zero \
            --max-complexity=10 \
            --max-line-length=127 \
            --statistics \
            2>&1 | tee reports/candidate-validation/flake8-inventory.txt

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail
          black --check src/datarepo 2>&1 \
            | tee reports/candidate-validation/black.txt

      - name: Run type checks
        shell: bash
        run: |
          set -euo pipefail
          mypy src/datarepo 2>&1 \
            | tee reports/candidate-validation/mypy.txt

      - name: Generate reviewed web catalog fixture
        shell: bash
        run: |
          set -euo pipefail
          rm -rf docs/examples/web_catalog
          mkdir -p docs/examples/web_catalog
          python docs/examples/generate_tpc_site.py \
            --output-dir docs/examples/web_catalog
          test -f docs/examples/web_catalog/index.html
          test -f docs/examples/web_catalog/data.json

      - name: Build documentation strictly
        run: mkdocs build --strict --site-dir site

      - name: Check local Markdown links
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          missing = []
          pattern = re.compile(r"\[[^\]]*\]\(([^)]+)\)")
          for source in Path("docs").rglob("*.md"):
              for target in pattern.findall(source.read_text(encoding="utf-8")):
                  target = target.strip().strip("<>")
                  if target.startswith(("http://", "https://", "mailto:", "#")):
                      continue
                  clean = target.split("#", 1)[0].split("?", 1)[0]
                  if not clean:
                      continue
                  if not (source.parent / clean).resolve().exists():
                      missing.append(f"{source}: {target}")
          if missing:
              raise SystemExit("Missing local links:\n" + "\n".join(missing))
          PY

      - name: Record exact-head evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/candidate-validation
          git rev-parse HEAD > reports/candidate-validation/exact-head.txt
          python --version > reports/candidate-validation/python-version.txt 2>&1
          python -m pip freeze > reports/candidate-validation/dependencies.txt
          if command -v mkdocs >/dev/null 2>&1; then
            mkdocs --version > reports/candidate-validation/mkdocs-version.txt 2>&1
          fi
          if [ -d site ]; then
            tar --sort=name \
                --mtime='UTC 1970-01-01' \
                --owner=0 --group=0 --numeric-owner \
                -czf reports/candidate-validation/site.tar.gz site
          fi
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          root = Path("reports/candidate-validation")
          lines = []
          for path in sorted(root.rglob("*")):
              if not path.is_file() or path.name == "SHA256SUMS":
                  continue
              lines.append(f"{sha256(path.read_bytes()).hexdigest()}  {path.relative_to(root).as_posix()}")
          (root / "SHA256SUMS").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: datarepo-validation-${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          path: reports/candidate-validation
          if-no-files-found: error
          retention-days: 30
